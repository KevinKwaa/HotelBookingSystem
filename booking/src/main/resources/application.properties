spring.application.name=booking
# Database
# spring.datasource.url=jdbc:postgresql://localhost:5432/hotel_booking
# spring.datasource.username=hotelDB
# spring.datasource.password=hotelBooking123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
# spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=your-super-secret-key-at-least-32-characters-long
jwt.expiration=86400000

# CORS (allow frontend dev server)
# cors.allowed-origins=http://localhost:5173

# host service
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}